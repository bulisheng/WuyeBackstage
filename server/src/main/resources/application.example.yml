server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: property-server
  data:
    mongodb:
      uri: mongodb://localhost:27017/property_management
  jackson:
    serialization:
      write-dates-as-timestamps: false

openclaw:
  local-base-url: http://127.0.0.1:18789/chat?session=agent%3Amain%3Amain
  remote-base-url: https://openclaw.example.com
  base-url: http://127.0.0.1:18789/chat?session=agent%3Amain%3Amain
  complaint-analysis-path: /api/v1/assistant/complaint/analyze
  analysis-timeout-ms: 5000

app:
  public-base-url: http://127.0.0.1:8080

repair:
  ack-secret: property-repair-ack-secret

complaint:
  ack-secret: property-complaint-ack-secret
  default-supervisor: 卜立胜

visitor:
  ack-secret: property-visitor-ack-secret

decoration:
  review-secret: property-decoration-review-secret

assistant:
  provider: deepseek

deepseek:
  base-url: https://api.deepseek.com
  local-base-url: https://api.deepseek.com
  remote-base-url: https://api.deepseek.com
  chat-path: /chat/completions
  model: deepseek-chat
  api-key: ""
  temperature: 0.2
  max-tokens: 512

feishu:
  customer-webhook-url: https://open.feishu.cn/open-apis/bot/v2/hook/3151f64f-bbbe-4ea2-a2cd-abae45822947
  repair-webhook-url: https://open.feishu.cn/open-apis/bot/v2/hook/fa44ef03-9edf-404f-97a0-c8745b45d380
  life-webhook-url: https://open.feishu.cn/open-apis/bot/v2/hook/9e81812c-50e9-4eca-ab11-8a5e9c403f5f

admin:
  api-key: dev-admin-123456
  session-ttl-minutes: 720

management:
  endpoints:
    web:
      exposure:
        include: health,info
