server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: property-server
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/property_management}
  jackson:
    serialization:
      write-dates-as-timestamps: false

openclaw:
  local-base-url: ${OPENCLAW_LOCAL_BASE_URL:${OPENCLAW_BASE_URL:http://127.0.0.1:18789/chat?session=agent%3Amain%3Amain}}
  remote-base-url: ${OPENCLAW_REMOTE_BASE_URL:https://openclaw.example.com}
  base-url: ${OPENCLAW_BASE_URL:${OPENCLAW_LOCAL_BASE_URL:http://127.0.0.1:18789/chat?session=agent%3Amain%3Amain}}
  complaint-analysis-path: ${OPENCLAW_COMPLAINT_ANALYSIS_PATH:/api/v1/assistant/complaint/analyze}
  analysis-timeout-ms: ${OPENCLAW_ANALYSIS_TIMEOUT_MS:5000}

assistant:
  provider: ${ASSISTANT_PROVIDER:deepseek}

deepseek:
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
  local-base-url: ${DEEPSEEK_LOCAL_BASE_URL:${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}}
  remote-base-url: ${DEEPSEEK_REMOTE_BASE_URL:${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}}
  chat-path: ${DEEPSEEK_CHAT_PATH:/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  api-key: ${DEEPSEEK_API_KEY:}
  temperature: ${DEEPSEEK_TEMPERATURE:0.2}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:512}

feishu:
  customer-webhook-url: ${FEISHU_CUSTOMER_WEBHOOK_URL:https://open.feishu.cn/open-apis/bot/v2/hook/3151f64f-bbbe-4ea2-a2cd-abae45822947}
  repair-webhook-url: ${FEISHU_REPAIR_WEBHOOK_URL:https://open.feishu.cn/open-apis/bot/v2/hook/fa44ef03-9edf-404f-97a0-c8745b45d380}
  life-webhook-url: ${FEISHU_LIFE_WEBHOOK_URL:https://open.feishu.cn/open-apis/bot/v2/hook/9e81812c-50e9-4eca-ab11-8a5e9c403f5f}

complaint:
  default-supervisor: ${COMPLAINT_DEFAULT_SUPERVISOR:卜立胜}

admin:
  api-key: ${ADMIN_API_KEY:dev-admin-123456}
  session-ttl-minutes: ${ADMIN_SESSION_TTL_MINUTES:720}

management:
  endpoints:
    web:
      exposure:
        include: health,info
