version: "3.8"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./server
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/property_management
      OPENCLAW_BASE_URL: https://openclaw.example.com
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis

  web-admin:
    build:
      context: ./web-admin
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo_data:
